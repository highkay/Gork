services:
  gork:
    container_name: gork
    image: ${GORK_IMAGE:-ghcr.io/dslzl/gork:latest}
    ports:
      - "${HOST_PORT:-8000}:${PORT:-${SERVER_PORT:-8000}}"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HOST: ${HOST:-${SERVER_HOST:-0.0.0.0}}
      PORT: ${PORT:-${SERVER_PORT:-8000}}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      ALLOW_UNAUTHENTICATED_API: ${ALLOW_UNAUTHENTICATED_API:-true}
      DATA_DIR: ${DATA_DIR:-/app/data}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      TMPDIR: ${TMPDIR:-/app/data/tmp}
      ACCOUNT_STORAGE: ${ACCOUNT_STORAGE:-local}
      ACCOUNT_LOCAL_PATH: ${ACCOUNT_LOCAL_PATH:-data/accounts.db}
      ACCOUNT_REDIS_URL: ${ACCOUNT_REDIS_URL:-}
      ACCOUNT_MYSQL_URL: ${ACCOUNT_MYSQL_URL:-}
      ACCOUNT_POSTGRESQL_URL: ${ACCOUNT_POSTGRESQL_URL:-}
      RUNTIME_REDIS_URL: ${RUNTIME_REDIS_URL:-}
      RUNTIME_TASK_TTL_S: ${RUNTIME_TASK_TTL_S:-300}
      RUNTIME_REDIS_LOCK_TTL_MS: ${RUNTIME_REDIS_LOCK_TTL_MS:-300000}
      # 启用 CF 自动刷新: 配置 proxy.clearance.mode=byparr，并取消底部 byparr 服务的注释
      # GROK_PROXY_CLEARANCE_MODE: byparr
      # GROK_PROXY_CLEARANCE_BYPARR_URL: http://byparr:8191
      # GROK_PROXY_CLEARANCE_REFRESH_INTERVAL: "600"
      # GROK_PROXY_CLEARANCE_TIMEOUT_SEC: "60"

      # ACCOUNT_STORAGE: local | redis | mysql | postgresql
      # ACCOUNT_LOCAL_PATH: SQLite path when ACCOUNT_STORAGE=local
      # ACCOUNT_REDIS_URL: Redis DSN when ACCOUNT_STORAGE=redis
      # ACCOUNT_MYSQL_URL: MySQL DSN when ACCOUNT_STORAGE=mysql
      # ACCOUNT_POSTGRESQL_URL: PostgreSQL DSN when ACCOUNT_STORAGE=postgresql
      # RUNTIME_REDIS_URL: optional Redis DSN for task snapshots and scheduler lock
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    read_only: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/app/gork", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    mem_limit: ${GORK_MEM_LIMIT:-768m}
    cpus: ${GORK_CPUS:-1.0}

  redis:
    profiles: ["redis"]
    container_name: gork-redis
    image: ${REDIS_IMAGE:-redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99}
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    mem_limit: ${REDIS_MEM_LIMIT:-256m}
    cpus: ${REDIS_CPUS:-0.5}

  # 如果出口 IP 不干净，可取消以下注释使用 MicroWARP 作为落地代理
  # 启用后将 proxy.egress.proxy_url 设为 socks5://warp:1080
  # warp:
  #   container_name: warp
  #   image: ${WARP_IMAGE:-ghcr.io/ccbkkb/microwarp:latest}
  #   restart: unless-stopped
  #   mem_limit: ${WARP_MEM_LIMIT:-256m}
  #   cpus: ${WARP_CPUS:-0.5}
  #   ports:
  #     - "127.0.0.1:1080:1080"
  #   environment:
  #     - SOCKS_PORT=1080
  #   cap_add:
  #     - NET_ADMIN

  # 启用 CF 自动刷新时取消以下注释
  # byparr:
  #   container_name: byparr
  #   image: ${BYPARR_IMAGE:-ghcr.io/thephaseless/byparr:latest}
  #   environment:
  #     TZ: Asia/Shanghai
  #     LOG_LEVEL: info
  #   restart: unless-stopped
  #   mem_limit: ${BYPARR_MEM_LIMIT:-1g}
  #   cpus: ${BYPARR_CPUS:-1.0}
