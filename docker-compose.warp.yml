services:
  # ── WARP: Cloudflare 出口代理 ─────────────────────────────────────────────
  warp-proxy:
    image: ${WARP_IMAGE:-ghcr.io/ccbkkb/microwarp:latest}
    container_name: warp-proxy
    restart: unless-stopped
    mem_limit: ${WARP_MEM_LIMIT:-256m}
    cpus: ${WARP_CPUS:-0.5}
    environment:
      - SOCKS_PORT=1080
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp-data:/etc/wireguard

  # ── Privoxy: HTTP 代理，转发到 WARP SOCKS5 ───────────────────────────────
  privoxy:
    image: ${PRIVOXY_WARP_IMAGE:-ghcr.io/jiujiu532/privoxy-warp@sha256:6aa1ede69f2a9f34d01eae59b5fd951ae88a17d5fb1d459fafb5c00653caae19}
    container_name: privoxy
    restart: unless-stopped
    mem_limit: ${PRIVOXY_MEM_LIMIT:-128m}
    cpus: ${PRIVOXY_CPUS:-0.25}
    ports:
      - "127.0.0.1:40080:8118"
    depends_on:
      - warp-proxy

  # ── Byparr: 自动解 Cloudflare 挑战 ─────────────────────────────────────
  byparr:
    image: ${BYPARR_IMAGE:-ghcr.io/thephaseless/byparr:latest}
    container_name: byparr
    restart: unless-stopped
    mem_limit: ${BYPARR_MEM_LIMIT:-1g}
    cpus: ${BYPARR_CPUS:-1.0}
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: info
    depends_on:
      privoxy:
        condition: service_started

  # ── gork ──────────────────────────────────────────────────────────────
  gork:
    image: ${GORK_IMAGE:-ghcr.io/dslzl/gork:latest}
    container_name: gork
    restart: unless-stopped
    mem_limit: ${GORK_MEM_LIMIT:-768m}
    cpus: ${GORK_CPUS:-1.0}
    ports:
      - "${HOST_PORT:-8000}:${PORT:-${SERVER_PORT:-8000}}"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HOST: ${HOST:-${SERVER_HOST:-0.0.0.0}}
      PORT: ${PORT:-${SERVER_PORT:-8000}}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      ALLOW_UNAUTHENTICATED_API: ${ALLOW_UNAUTHENTICATED_API:-true}
      DATA_DIR: ${DATA_DIR:-/app/data}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      TMPDIR: ${TMPDIR:-/app/data/tmp}
      ACCOUNT_STORAGE: ${ACCOUNT_STORAGE:-local}
      ACCOUNT_LOCAL_PATH: ${ACCOUNT_LOCAL_PATH:-data/accounts.db}
      ACCOUNT_REDIS_URL: ${ACCOUNT_REDIS_URL:-}
      ACCOUNT_MYSQL_URL: ${ACCOUNT_MYSQL_URL:-}
      ACCOUNT_POSTGRESQL_URL: ${ACCOUNT_POSTGRESQL_URL:-}
      RUNTIME_REDIS_URL: ${RUNTIME_REDIS_URL:-}
    volumes:
      - ./config.defaults.toml:/app/config.defaults.toml:ro
      - ./data:/app/data
      - ./logs:/app/logs
    read_only: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/app/gork", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      warp-proxy:
        condition: service_started
      privoxy:
        condition: service_started
      byparr:
        condition: service_started

  # ── FlareSolverr fallback: 将 proxy.clearance.mode 改回 flaresolverr 时启用 ──
