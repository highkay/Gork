name: Build Privoxy-WARP Image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.privoxy
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push privoxy-warp
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.privoxy
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/privoxy-warp:latest
