name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      # 针对 PR：使用原生逻辑
      - name: Setup PR commits & Run Gitleaks
        id: gitleaks-pr
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          git fetch --no-tags --prune --depth=1 origin \
            "+${{ github.event.pull_request.base.sha }}:refs/remotes/origin/pr-base"
          git remote add pr-head "https://github.com/${{ github.event.pull_request.head.repo.full_name }}.git"
          git fetch --no-tags --prune --depth=1 pr-head \
            "+${{ github.event.pull_request.head.sha }}:refs/remotes/pr-head/current"
            
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.24.3 \
            detect --source . --redact -v --exit-code=2 \
            --report-format=json --report-path=gitleaks-report.json \
            --log-opts="--no-merges refs/remotes/origin/pr-base..refs/remotes/pr-head/current"

      - name: Upload redacted Gitleaks report
        if: github.event_name == 'pull_request' && steps.gitleaks-pr.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-redacted-report
          path: gitleaks-report.json
          if-no-files-found: ignore

      - name: Fail on Gitleaks findings
        if: github.event_name == 'pull_request' && steps.gitleaks-pr.outcome == 'failure'
        run: exit 1

      # 针对 Push 和 Schedule：使用官方 Action
      - name: Run Gitleaks Action
        if: github.event_name != 'pull_request'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
        continue-on-error: true

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Python dependency manifests
        id: python-manifests
        run: |
          if ls pyproject.toml uv.lock requirements*.txt poetry.lock Pipfile.lock >/dev/null 2>&1; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No Python dependency manifests found; pip-audit is skipped for the Go mainline."
          fi
      - name: Install uv
        if: steps.python-manifests.outputs.present == 'true'
        uses: astral-sh/setup-uv@v3
      - name: Export requirements
        if: steps.python-manifests.outputs.present == 'true'
        run: uv export --frozen --no-dev --format requirements-txt -o /tmp/req.txt
      - name: Run pip-audit
        if: steps.python-manifests.outputs.present == 'true'
        run: |
          uvx pip-audit -r /tmp/req.txt --progress-spinner off \
            --ignore-vuln PYSEC-2026-161
          echo "Dependency audit passed"

  govulncheck:
    name: Go Module Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run govulncheck
        run: |
          set +e
          go run golang.org/x/vuln/cmd/govulncheck@latest -json ./... > govulncheck.json
          status=$?
          set -e
          go run ./tools/govulnsummary -input govulncheck.json | tee govulncheck-summary.txt
          exit "$status"
      - name: Upload govulncheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report
          path: |
            govulncheck.json
            govulncheck-summary.txt
          if-no-files-found: ignore

  trivy-fs:
    name: Go Module and Static Asset Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan repository filesystem
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: os,library
          scanners: vuln,secret,misconfig
          skip-dirs: .git,.gocache,.uv-cache,data,logs
          severity: HIGH,CRITICAL
          exit-code: "1"

  trivy-image:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build local image
        run: docker build -t gork-security-scan:${{ github.sha }} .
      - name: Scan local image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: gork-security-scan:${{ github.sha }}
          vuln-type: os,library
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
