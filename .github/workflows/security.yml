name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      # 针对 PR：使用原生逻辑
      - name: Setup PR commits & Run Gitleaks
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --prune --depth=1 origin \
            "+${{ github.event.pull_request.base.sha }}:refs/remotes/origin/pr-base"
          git remote add pr-head "https://github.com/${{ github.event.pull_request.head.repo.full_name }}.git"
          git fetch --no-tags --prune --depth=1 pr-head \
            "+${{ github.event.pull_request.head.sha }}:refs/remotes/pr-head/current"
            
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.24.3 \
            detect --source . --redact -v --exit-code=2 \
            --log-opts="--no-merges refs/remotes/origin/pr-base..refs/remotes/pr-head/current"

      # 针对 Push 和 Schedule：使用官方 Action
      - name: Run Gitleaks Action
        if: github.event_name != 'pull_request'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
        continue-on-error: true

  # 纯 Go 仓库：不再跑 Python pip-audit（历史遗留）

  govulncheck:
    name: Go Module Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # 使用较新补丁版本以覆盖 go.mod 最低版本，便于标准库安全修复
          go-version: "1.26.5"
          cache: true
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  trivy-fs:
    name: Go Module and Static Asset Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan repository filesystem
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          # fs 扫描只做依赖/密钥；misconfig 对 Dockerfile USER 在容器内 root 的策略告警
          # 会与本服务需写 data/ 的运行方式冲突，误配置放到 image 扫描侧看 OS 漏洞
          vuln-type: library
          scanners: vuln,secret
          skip-dirs: .git,.gocache,.uv-cache,data,logs
          severity: HIGH,CRITICAL
          exit-code: "1"

  trivy-image:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build local image
        run: docker build -t gork-security-scan:${{ github.sha }} .
      - name: Scan local image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: gork-security-scan:${{ github.sha }}
          # 镜像扫 OS+依赖漏洞；不因 Dockerfile misconfig（如无 USER）失败
          vuln-type: os,library
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
