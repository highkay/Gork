name: Compose Smoke

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  compose-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate standard compose
        run: docker compose -f docker-compose.yml config

      - name: Validate WARP compose
        run: docker compose -f docker-compose.warp.yml config

      - name: Validate demo compose
        run: docker compose -f docker-compose.demo.yml config

  container-healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build local image
        run: docker build -t gork:ci .

      - name: Start container
        run: docker run -d --name gork-health-smoke -p 18080:8000 gork:ci

      - name: Wait for healthcheck
        run: |
          for attempt in $(seq 1 30); do
            if docker exec gork-health-smoke /app/gork healthcheck; then
              exit 0
            fi
            sleep 2
          done
          docker logs gork-health-smoke
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f gork-health-smoke || true
