title = "gork secret scan"

[extend]
useDefault = true

[[allowlists]]
description = "obvious test and fixture tokens"
regexes = [
  '''(?i)(fake|dummy|example|test)[-_ ]?(api[-_ ]?key|secret|token|password)''',
  '''(?i)(api[-_ ]?key|secret|token|password)[-_ ]?(fake|dummy|example|test)''',
]
paths = [
  '''(^|/).*_test\.go$''',
  '''(^|/)tests/''',
  '''(^|/)docs/''',
]
